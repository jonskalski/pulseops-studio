<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseOps Studio — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --recess: #090b12; --base: #10131d; --surface: #171b28;
      --border: #343a4d; --border-soft: rgba(255,255,255,0.07);
      --text: #f1f3f7; --muted: #a3a9b8; --faint: #697083;
      --accent: #d984a7; --bad: #ff7f8b;
      --gradient: linear-gradient(135deg, #4455dd, #00aaff, #00e8ff);
      --font: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    html {
      color: var(--text);
      background:
        radial-gradient(circle at 12% 4%, rgba(68,85,221,0.18), transparent 32rem),
        radial-gradient(circle at 92% 0%, rgba(0,232,255,0.10), transparent 28rem),
        var(--base);
      font-family: var(--font);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    body { margin: 0; width: 100%; }
    .card {
      width: min(400px, calc(100vw - 40px));
      background: rgba(23,27,40,0.92);
      border: 1px solid var(--border-soft);
      border-radius: 2px;
      padding: 36px;
    }
    .mark {
      width: 42px; height: 42px;
      border: 1px solid rgba(255,255,255,0.14);
      background: linear-gradient(var(--recess),var(--recess)) padding-box, var(--gradient) border-box;
      border-radius: 2px;
      display: grid; place-items: center;
      font-size: 12px; font-weight: 900; letter-spacing: 0.08em;
      margin-bottom: 20px;
    }
    h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: -0.03em; }
    .sub { margin: 0 0 28px; color: var(--faint); font-size: 13px; }
    .field { display: grid; gap: 7px; margin-bottom: 16px; }
    .field label { color: var(--faint); font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; }
    .field input {
      width: 100%; border: 1px solid var(--border); background: var(--recess);
      color: var(--text); padding: 12px; border-radius: 2px; outline: none; font: inherit;
    }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(217,132,167,0.13); }
    .btn { width: 100%; border: 1px solid var(--accent); background: var(--accent); color: #1b1015; padding: 13px; border-radius: 2px; cursor: pointer; font-weight: 800; font-size: 14px; font: inherit; font-weight: 800; }
    .btn:hover { opacity: 0.9; }
    .error { margin-bottom: 16px; padding: 12px; background: rgba(255,127,139,0.08); border: 1px solid rgba(255,127,139,0.35); color: var(--bad); font-size: 13px; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">PO</div>
    <h1>PulseOps Studio</h1>
    <p class="sub">Control panel. Private access only.</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="error">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="post">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password">
      </div>
      <button class="btn" type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
